<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 航海家 · 人脉雷达</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1622;
    --surface:rgba(255,255,255,0.022);
    --surface-2:#0f1f30;
    --line:rgba(255,255,255,0.08);
    --line-2:rgba(255,255,255,0.14);
    --accent:#2fd6bf;
    --accent-soft:#5be3c8;
    --grad:linear-gradient(118deg,#5af0a8 0%,#2fd6c8 55%,#22cae4 100%);
    --text:#e9eff6;
    --muted:#8b98a8;
    --muted-2:#5a6878;
    --danger:#ff8c7a;
    --aqua:#2fd6bf;
    --display:'Sora',sans-serif;
    --body:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--body);color:var(--text);line-height:1.65;min-height:100vh;
    -webkit-font-smoothing:antialiased;
    background:radial-gradient(1100px 680px at 50% -12%, rgba(47,150,200,0.10), transparent 60%), var(--bg);
    background-attachment:fixed;
  }
  .wrap{width:min(100%,720px);margin:0 auto;padding:46px 24px 90px;}

  /* header */
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:54px;}
  .logo .mark{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
    background:rgba(255,255,255,0.05);border:1.4px solid rgba(255,255,255,0.55);}
  .logo .name{font-weight:900;font-size:18px;letter-spacing:0.03em;}

  h1{font-weight:900;font-size:clamp(28px,5vw,40px);line-height:1.18;letter-spacing:-0.01em;margin-bottom:14px;}
  h1 .ac{color:var(--accent);}
  .sub{color:var(--muted);font-size:16px;max-width:520px;margin-bottom:34px;}

  /* console */
  .console{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;}
  .field{margin-bottom:16px;}
  .field:last-of-type{margin-bottom:4px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;}
  label .opt{color:var(--muted-2);font-weight:400;}
  textarea{width:100%;background:rgba(0,0,0,0.22);border:1px solid var(--line);border-radius:11px;
    color:var(--text);font-family:var(--body);font-size:15.5px;line-height:1.6;padding:13px 15px;
    resize:vertical;transition:border-color .2s, box-shadow .2s;}
  textarea::placeholder{color:var(--muted-2);}
  textarea:focus{outline:none;border-color:var(--line-2);box-shadow:0 0 0 3px rgba(47,214,191,0.08);}
  #need{min-height:92px;} #intro{min-height:44px;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;}
  .chip{font-size:12.5px;color:var(--muted);background:transparent;border:1px solid var(--line);
    border-radius:999px;padding:6px 13px;cursor:pointer;transition:all .18s;}
  .chip:hover{color:var(--text);border-color:var(--accent);}

  .actionbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:18px;flex-wrap:wrap;}
  .corpus{font-size:12.5px;color:var(--muted-2);}
  .corpus b{color:var(--accent);font-weight:700;font-family:var(--display);}
  .linkbtn{background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;font-family:var(--body);padding:0;}
  .linkbtn:hover{color:var(--accent);}
  .go{font-family:var(--body);font-weight:700;font-size:15px;color:#04261f;cursor:pointer;background:var(--grad);
    border:none;border-radius:11px;padding:12px 26px;display:inline-flex;align-items:center;gap:8px;
    box-shadow:0 10px 26px -12px rgba(47,214,191,0.6);transition:transform .15s, box-shadow .2s, filter .2s;}
  .go:hover{transform:translateY(-1px);box-shadow:0 14px 30px -12px rgba(47,214,191,0.7);}
  .go:disabled{filter:grayscale(.5) brightness(.85);cursor:wait;transform:none;}

  /* loading */
  .loading{display:none;margin-top:30px;align-items:center;gap:12px;color:var(--muted);font-size:14px;}
  .loading.on{display:flex;animation:fade .3s ease;}
  .spin{width:18px;height:18px;border-radius:50%;border:2px solid var(--line-2);border-top-color:var(--accent);animation:rot .8s linear infinite;flex:0 0 auto;}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* results */
  .results{margin-top:34px;display:grid;gap:14px;}
  .res-head{display:none;margin:0 2px 6px;}
  .res-head.on{display:block;}
  .res-head h2{font-weight:700;font-size:15px;color:var(--muted);letter-spacing:0.01em;}
  .note{background:rgba(47,214,191,0.06);border:1px solid rgba(47,214,191,0.2);border-radius:12px;padding:12px 15px;font-size:14px;color:var(--text);}
  .note::before{content:"领航提示 · ";color:var(--accent);font-weight:600;}

  .card{background:var(--surface-2);border:1px solid var(--line);border-radius:15px;padding:22px;
    opacity:0;transform:translateY(10px);animation:rise .45s ease forwards;transition:border-color .2s;}
  .card:hover{border-color:var(--line-2);}
  .c-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .idx{font-family:var(--display);font-weight:700;font-size:12px;color:var(--muted-2);letter-spacing:0.06em;}
  .match{font-size:12.5px;color:var(--muted);}
  .match b{font-family:var(--display);font-weight:700;font-size:17px;color:var(--accent);}
  .match i{font-style:normal;font-size:11px;color:var(--accent);margin-left:1px;}
  .who{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .who .name{font-weight:700;font-size:18px;}
  .who .role{font-size:13px;color:var(--muted);}
  .bar{height:4px;border-radius:99px;background:rgba(0,0,0,0.3);overflow:hidden;margin:13px 0 4px;}
  .bar > i{display:block;height:100%;border-radius:99px;background:var(--grad);width:0;transition:width .9s cubic-bezier(.2,.8,.2,1);}

  .block{margin-top:15px;}
  .block .lbl{font-size:12px;color:var(--muted-2);margin-bottom:5px;font-weight:600;}
  .block p{font-size:14.5px;line-height:1.62;}
  .block p.muted{color:var(--muted);}
  .ice{background:rgba(0,0,0,0.22);border:1px solid var(--line);border-radius:11px;padding:12px 70px 12px 14px;font-size:14px;line-height:1.6;position:relative;}
  .copy{position:absolute;right:9px;top:8px;background:rgba(47,214,191,0.1);border:1px solid var(--line-2);color:var(--accent);font-size:11.5px;border-radius:7px;padding:3px 9px;cursor:pointer;font-family:var(--body);transition:background .18s;}
  .copy:hover{background:rgba(47,214,191,0.2);}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
  .tag{font-size:11.5px;color:var(--muted-2);border:1px solid var(--line);border-radius:6px;padding:3px 8px;}
  .empty{text-align:center;color:var(--muted);padding:24px 8px;font-size:14.5px;}
  .morebar{display:none;margin:28px auto 0;width:min(100%,520px);}
  .morebar.on{display:block;}
  .morebar .go,.morebar .ghost{width:100%;min-height:54px;justify-content:center;font-size:16px;}
  .ghost{font-family:var(--body);font-weight:700;color:var(--text);cursor:pointer;background:rgba(255,255,255,0.035);
    border:1px solid var(--line-2);border-radius:11px;padding:12px 18px;display:inline-flex;align-items:center;gap:8px;
    transition:transform .15s, border-color .2s, color .2s, background .2s;}
  .ghost:hover{transform:translateY(-1px);border-color:rgba(47,214,191,0.45);color:var(--accent);background:rgba(47,214,191,0.06);}
  .ghost:disabled{opacity:.42;cursor:not-allowed;transform:none;color:var(--muted);}
  .secondary-actions{display:grid;grid-template-columns:1fr;margin-top:12px;}
  .secondary-actions .ghost{text-decoration:none;justify-content:center;min-height:46px;}

  .swipe-stage{display:grid;gap:16px;}
  .swipe-deck{min-height:430px;display:grid;place-items:center;position:relative;touch-action:pan-y;}
  .swipe-card{width:100%;min-height:410px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:18px;padding:24px;
    display:flex;flex-direction:column;box-shadow:0 24px 70px -48px rgba(0,0,0,.75);transition:transform .2s ease, opacity .2s ease, border-color .2s ease;user-select:none;}
  .swipe-card.dragging{transition:none;cursor:grabbing;}
  .swipe-card.like{border-color:rgba(47,214,191,.65);}
  .swipe-card.skip{border-color:rgba(255,140,122,.55);}
  .swipe-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;}
  .swipe-name{font-size:26px;font-weight:900;line-height:1.2;overflow-wrap:anywhere;}
  .swipe-role{font-size:13px;color:var(--muted);margin-top:6px;}
  .score-pill{font-family:var(--display);font-weight:700;color:var(--accent);border:1px solid rgba(47,214,191,.26);
    border-radius:999px;padding:7px 11px;white-space:nowrap;background:rgba(47,214,191,.07);}
  .value-line{font-size:16px;line-height:1.7;color:var(--text);margin:10px 0 16px;}
  .swipe-detail{display:none;margin-top:12px;border-top:1px solid var(--line);padding-top:14px;}
  .swipe-detail.on{display:block;}
  .detail-toggle{align-self:flex-start;margin-top:auto;border:1px solid var(--line-2);background:rgba(255,255,255,.035);color:var(--text);
    border-radius:9px;padding:8px 13px;font-family:var(--body);font-weight:700;cursor:pointer;}
  .decision-mark{position:absolute;top:26px;font-family:var(--display);font-size:30px;font-weight:700;letter-spacing:.08em;
    opacity:0;pointer-events:none;transform:rotate(-10deg);}
  .decision-mark.like{left:28px;color:var(--accent);}
  .decision-mark.skip{right:28px;color:var(--danger);transform:rotate(10deg);}
  .swipe-card.like .decision-mark.like,.swipe-card.skip .decision-mark.skip{opacity:.9;}
  .swipe-actions{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;}
  .swipe-actions .go,.swipe-actions .ghost{min-height:52px;justify-content:center;}
  .summary{display:grid;gap:14px;}
  .summary-head{background:rgba(47,214,191,.06);border:1px solid rgba(47,214,191,.2);border-radius:14px;padding:16px;}
  .summary-head h3{font-size:18px;margin-bottom:4px;}
  .summary-head p{font-size:14px;color:var(--muted);}
  .summary-list{display:grid;gap:12px;}
  .summary-card{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:18px;}
  .summary-card .who{margin-bottom:10px;}

  /* drawer */
  .drawer{display:none;margin-top:16px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:20px;}
  .drawer.on{display:block;animation:fade .3s ease;}
  .drawer h3{font-weight:700;font-size:16px;margin-bottom:5px;}
  .drawer p{font-size:13px;color:var(--muted);margin-bottom:13px;}
  .drawer code{background:rgba(47,214,191,0.12);color:var(--accent);padding:1px 6px;border-radius:5px;font-size:12px;}
  .drawer textarea{min-height:140px;font-size:13.5px;}
  .drawer .row{display:flex;gap:9px;margin-top:13px;align-items:center;flex-wrap:wrap;}
  .mini{font-family:var(--body);font-size:13.5px;border-radius:9px;padding:9px 16px;cursor:pointer;border:1px solid var(--line-2);background:transparent;color:var(--text);transition:transform .15s;}
  .mini.primary{background:var(--grad);color:#04261f;border:none;font-weight:700;}
  .mini:hover{transform:translateY(-1px);}
  .drawer .hint{font-size:12px;color:var(--muted-2);}

  footer{margin-top:50px;text-align:center;font-size:12px;color:var(--muted-2);}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{to{opacity:1;transform:none}}

  @media (max-width:560px){
    .wrap{padding:24px 14px calc(56px + env(safe-area-inset-bottom));}
    .logo{gap:9px;margin-bottom:30px;}
    .logo .mark{width:42px;height:42px;border-radius:13px;}
    .logo .name{font-size:24px;}
    .logo svg{width:21px;height:21px;}
    h1{font-size:36px;line-height:1.12;margin-bottom:14px;}
    .sub{font-size:15px;line-height:1.8;margin-bottom:26px;}
    .console{border-radius:14px;padding:16px;}
    label{font-size:12.5px;}
    textarea{font-size:16px;padding:12px 13px;}
    #need{min-height:116px;}
    #intro{min-height:74px;}
    .chips{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
    .chips::-webkit-scrollbar{display:none;}
    .chip{flex:0 0 auto;max-width:82vw;white-space:nowrap;}
    .actionbar{flex-direction:column-reverse;align-items:stretch;gap:12px;}
    .go{justify-content:center;}
    .corpus{text-align:center;}
    .secondary-actions .ghost{min-height:50px;}
    .results{margin-top:26px;gap:12px;}
    .morebar{margin-top:22px;width:100%;}
    .morebar .go,.morebar .ghost{min-height:52px;}
    .swipe-deck{min-height:390px;}
    .swipe-card{min-height:370px;border-radius:15px;padding:18px;}
    .swipe-name{font-size:22px;}
    .swipe-top{display:grid;}
    .score-pill{justify-self:start;}
    .value-line{font-size:15px;}
    .swipe-actions{grid-template-columns:1fr;}
    .card{border-radius:13px;padding:16px;}
    .who{display:grid;gap:3px;}
    .who .name{font-size:17px;line-height:1.35;overflow-wrap:anywhere;}
    .who .role{font-size:12.5px;line-height:1.45;}
    .block{margin-top:13px;}
    .block p{font-size:14px;}
    .ice{padding:12px 13px;}
    .copy{position:static;display:inline-flex;margin:0 0 8px auto;}
    .tag{font-size:11px;max-width:100%;overflow-wrap:anywhere;}
    footer{margin-top:36px;}
  }

  @media (max-width:380px){
    .wrap{padding-left:12px;padding-right:12px;}
    .logo .name{font-size:22px;}
    h1{font-size:32px;}
    .console,.card{padding:14px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <span class="mark">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M5 19 C9 17 15 17 19 19" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M12 3 L12 16 L5 16 C7 11 9.5 7 12 3 Z" fill="#fff"/>
        <path d="M13.5 6 L13.5 16 L19 16 C17.3 12 15.4 9 13.5 6 Z" fill="#fff" fill-opacity="0.7"/>
      </svg>
    </span>
    <span class="name">AI 航海家</span>
  </div>

  <h1>你好<span class="ac">航海家</span></h1>
  <p class="sub">在这场大会的参会者里，为你匹配最该认识的人——并告诉你为什么、怎么开口。</p>

  <section class="console">
    <div class="field">
      <label>你想找什么样的人 / 解决什么问题</label>
      <textarea id="need" placeholder="例：供应链交期总是不稳,在欧洲也缺海外仓,想找靠谱的工厂和物流伙伴。"></textarea>
      <div class="chips" id="chips"></div>
    </div>
    <div class="field">
      <label>简单介绍下你自己 <span class="opt">· 选填，可让匹配更准</span></label>
      <textarea id="intro" placeholder="例：我做女装跨境电商,独立站 + 亚马逊,主攻欧美市场。"></textarea>
    </div>
    <div class="actionbar">
      <div class="corpus">已收录现场群整理结果 <b id="count">0</b> 位</div>
      <button class="go" id="go">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        帮我找人
      </button>
    </div>
    <div class="secondary-actions">
      <a class="ghost" href="/graph.html">
        查看关系图谱
      </a>
    </div>
  </section>

  <div class="loading" id="loading"><span class="spin"></span><span id="loadmsg">正在扫描全场参会者……</span></div>

  <div class="res-head" id="resHead"><h2 id="resSub"></h2></div>
  <div class="results" id="results"></div>
  <div class="morebar" id="morebar">
    <button class="go" id="more" type="button">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      再来一批
    </button>
  </div>

  <footer>AI 航海家 · 人脉雷达 — 基于现场群整理结果</footer>
</div>

<script>
const EXAMPLES = [
  "做女装跨境电商，想找工厂和欧洲海外仓",
  "想接入 AI 客服，找能落地的技术团队",
  "有一笔钱，想投早期新消费品牌",
  "做线下连锁，想做私域和短视频引流"
];

const $ = s => document.querySelector(s);
const introEl=$("#intro"), needEl=$("#need"), goEl=$("#go"), moreEl=$("#more"),
      countEl=$("#count"), resultsEl=$("#results"), resHead=$("#resHead"),
      resSub=$("#resSub"), loading=$("#loading"), loadmsg=$("#loadmsg"),
      morebar=$("#morebar");
let seenIds = [];
let batches = [];
let currentBatch = [];
let currentCardIndex = 0;
let interested = [];
let skipped = [];

const chipsEl=$("#chips");
EXAMPLES.forEach(t=>{ const c=document.createElement("button"); c.className="chip"; c.textContent=t;
  c.onclick=()=>{ needEl.value=t; needEl.focus(); }; chipsEl.appendChild(c); });

const LOADING_MSGS=["正在扫描全场参会者……","比对能力、资源与需求……","计算每个人的契合度……","为你绘制最优航线……"];
let lmTimer=null;
function startLoading(){ resultsEl.innerHTML=""; resHead.classList.remove("on");
  morebar.classList.remove("on");
  loading.classList.add("on"); let i=0; loadmsg.textContent=LOADING_MSGS[0];
  lmTimer=setInterval(()=>{ i=(i+1)%LOADING_MSGS.length; loadmsg.textContent=LOADING_MSGS[i]; }, 1400); }
function stopLoading(){ loading.classList.remove("on"); clearInterval(lmTimer); }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function attr(s){ return esc(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function copyText(text, button){
  const done=()=>{ const o=button.textContent; button.textContent="已复制 ✓"; setTimeout(()=>button.textContent=o,1500); };
  navigator.clipboard?.writeText(text).then(done).catch(()=>{
    const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select();
    try{document.execCommand("copy");}catch(_){} ta.remove(); done();
  });
}

function shortText(text, max=86){
  const value=(text||"").trim();
  return value.length>max ? value.slice(0,max)+"…" : value;
}

function startSwipeBatch(result){
  if(result.corpusCount) countEl.textContent = result.corpusCount;
  currentBatch = (result.matches||[]).filter(m=>m.person).slice(0,8);
  currentCardIndex = 0;
  interested = [];
  skipped = [];
  seenIds = [...new Set([...seenIds, ...currentBatch.map(m=>m.id)])];
  batches.push(result);
  renderCurrentCard();
}

function renderCurrentCard(){
  resHead.classList.add("on");
  morebar.classList.remove("on");
  if(!currentBatch.length){
    resSub.textContent = "";
    resultsEl.innerHTML = `<div class="card" style="opacity:1;transform:none"><div class="empty">这次没有找到足够契合的人选。<br>把诉求说得更具体一点，AI 会找得更准。</div></div>`;
    morebar.classList.add("on");
    return;
  }

  if(currentCardIndex >= currentBatch.length){ showSummary(); return; }

  const m=currentBatch[currentCardIndex];
  const p=m.person;
  const score=Math.max(0,Math.min(100,Math.round(m.score||0)));
  const tags=(p.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
  resSub.textContent = `第 ${currentCardIndex+1} / ${currentBatch.length} 位 · 右滑想认识，左滑跳过`;
  resultsEl.innerHTML = `
    <section class="swipe-stage">
      <div class="swipe-deck">
        <article class="swipe-card" id="swipeCard">
          <div class="decision-mark like">想认识</div>
          <div class="decision-mark skip">跳过</div>
          <div class="swipe-top">
            <div>
              <div class="swipe-name">${esc(p.name)}</div>
              <div class="swipe-role">${esc(p.role)}</div>
            </div>
            <div class="score-pill">${score}% 契合</div>
          </div>
          <p class="value-line">${esc(shortText(m.reason))}</p>
          <div class="tags">${tags}</div>
          <button class="detail-toggle" id="detailToggle" type="button">查看详情</button>
          <div class="swipe-detail" id="swipeDetail">
            <div class="block"><div class="lbl">推荐理由</div><p>${esc(m.reason)}</p></div>
            <div class="block"><div class="lbl">你们的契合点</div><p class="muted">${esc(m.synergy)}</p></div>
            <div class="block"><div class="lbl">破冰开场白</div><div class="ice"><button class="copy" data-copy="${attr(m.icebreaker)}">复制</button>${esc(m.icebreaker)}</div></div>
          </div>
        </article>
      </div>
      <div class="swipe-actions">
        <button class="ghost" id="skipCard" type="button">左滑跳过</button>
        <button class="go" id="likeCard" type="button">右滑想认识</button>
      </div>
    </section>`;
  bindCardEvents();
}

function bindCardEvents(){
  const card=$("#swipeCard");
  $("#skipCard").onclick=()=>decide("skip");
  $("#likeCard").onclick=()=>decide("like");
  $("#detailToggle").onclick=()=>$("#swipeDetail").classList.toggle("on");
  resultsEl.querySelectorAll(".copy").forEach(b=>b.onclick=()=>copyText(b.dataset.copy,b));
  let startX=0, dx=0, dragging=false;
  card.addEventListener("pointerdown", e=>{
    dragging=true; startX=e.clientX; dx=0; card.classList.add("dragging"); card.setPointerCapture?.(e.pointerId);
  });
  card.addEventListener("pointermove", e=>{
    if(!dragging) return;
    dx=e.clientX-startX;
    card.style.transform=`translateX(${dx}px) rotate(${dx/18}deg)`;
    card.classList.toggle("like", dx>40);
    card.classList.toggle("skip", dx<-40);
  });
  card.addEventListener("pointerup", ()=>{
    if(!dragging) return;
    dragging=false; card.classList.remove("dragging");
    if(dx>90){ decide("like"); return; }
    if(dx<-90){ decide("skip"); return; }
    card.style.transform=""; card.classList.remove("like","skip");
  });
}

function decide(type){
  const item=currentBatch[currentCardIndex];
  if(!item) return;
  if(type==="like") interested.push(item); else skipped.push(item);
  const card=$("#swipeCard");
  if(card){
    const x=type==="like" ? 520 : -520;
    card.classList.add(type==="like" ? "like" : "skip");
    card.style.transform=`translateX(${x}px) rotate(${type==="like" ? 18 : -18}deg)`;
    card.style.opacity="0";
  }
  currentCardIndex += 1;
  setTimeout(renderCurrentCard, 180);
}

function showSummary(){
  resHead.classList.add("on");
  resSub.textContent = `已筛完 ${currentBatch.length} 位 · 想认识 ${interested.length} 位`;
  const selected = interested.length ? interested.map((m,idx)=>{
    const p=m.person;
    return `
      <div class="summary-card">
        <div class="who"><span class="name">${esc(p.name)}</span><span class="role">${esc(p.role)}</span></div>
        <div class="block"><div class="lbl">为什么值得聊</div><p>${esc(m.synergy || m.reason)}</p></div>
        <div class="block"><div class="lbl">破冰开场白</div><div class="ice"><button class="copy" data-copy="${attr(m.icebreaker)}">复制</button>${esc(m.icebreaker)}</div></div>
      </div>`;
  }).join("") : `<div class="card" style="opacity:1;transform:none"><div class="empty">这一批你还没有选择想认识的人。<br>可以点“再来一批”，继续筛新的候选人。</div></div>`;
  resultsEl.innerHTML = `
    <section class="summary">
      <div class="summary-head">
        <h3>本批精选联系人</h3>
        <p>你右滑了 ${interested.length} 位，跳过了 ${skipped.length} 位。下一批会继续排除这些已经出现过的人。</p>
      </div>
      <div class="summary-list">${selected}</div>
    </section>`;
  resultsEl.querySelectorAll(".copy").forEach(b=>b.onclick=()=>copyText(b.dataset.copy,b));
  morebar.classList.add("on");
}

function showError(msg){
  resHead.classList.add("on"); resSub.textContent=""; morebar.classList.remove("on");
  resultsEl.innerHTML = `<div class="card" style="opacity:1;transform:none"><div class="block"><div class="lbl" style="color:var(--danger)">没能完成匹配</div><p class="muted">${esc(msg)}</p></div></div>`;
}

async function run({append=false}={}){
  const intro=introEl.value.trim(), need=needEl.value.trim();
  if(!need){ needEl.focus(); needEl.style.borderColor="var(--danger)"; setTimeout(()=>needEl.style.borderColor="",1200); return; }
  if(!append){ seenIds = []; batches = []; }
  goEl.disabled=true; moreEl.disabled=true; startLoading();
  try{
    const resp = await fetch("/api/match", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ intro, need, excludeIds: append ? seenIds : [] })
    });
    const result = await resp.json();
    if(!resp.ok) throw new Error(result.error || "后端匹配失败");
    stopLoading();
    startSwipeBatch(result);
  }catch(err){
    stopLoading();
    showError("后端或 AI 接口暂时没有完成匹配。请确认本地服务已启动，且 API 配置可用。\n\n（错误信息："+(err.message||err)+"）");
  }finally{ goEl.disabled=false; moreEl.disabled=false; }
}
goEl.addEventListener("click", run);
moreEl.addEventListener("click", ()=>run({append:true}));
needEl.addEventListener("keydown", e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") run(); });

async function loadCount(){
  try{
    const resp = await fetch("/api/people/count");
    const data = await resp.json();
    if(resp.ok) countEl.textContent = data.count || 0;
  }catch(_){
    countEl.textContent = "0";
  }
}
loadCount();
</script>
</body>
</html>
